<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Resfebe Challenge – YTFL</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  /* School palette: deep navy + gold + red accents */
  --bg:        #0a1628;
  --bg2:       #0f1e38;
  --surface:   #132240;
  --surface2:  #1a2d52;
  --primary:   #c9a227;   /* gold */
  --plight:    #e8c55a;
  --accent:    #d62828;   /* red */
  --correct:   #1fd172;
  --wrong:     #e84545;
  --text:      #f0e6c8;
  --muted:     #8fa3c8;
  --border:    rgba(201,162,39,.25);
  --shadow:    0 4px 28px rgba(0,0,0,.55);
  --radius:    16px;
}

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
  background-image:
    radial-gradient(ellipse at 15% 0%,   #1a3566 0%, transparent 55%),
    radial-gradient(ellipse at 85% 100%, #2a1a08 0%, transparent 55%);
}

/* ── ATOM PARTICLES (decorative bg) ── */
.atom-bg {
  position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
}
.orbit {
  position: absolute; border-radius: 50%;
  border: 1px solid rgba(201,162,39,.08);
  animation: spin linear infinite;
}
.orbit:nth-child(1) { width:300px;height:300px; top:-80px; left:-80px; animation-duration:22s; }
.orbit:nth-child(2) { width:220px;height:220px; bottom:-60px; right:-60px; animation-duration:16s; animation-direction:reverse; }
.orbit:nth-child(3) { width:160px;height:160px; top:40%; right:5%; animation-duration:30s; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── HEADER ── */
header {
  background: linear-gradient(90deg, #0d1e3d 0%, #132240 60%, #1a2d15 100%);
  border-bottom: 2px solid var(--primary);
  padding: .45rem 1rem;
  display: flex; align-items: center; justify-content: space-between; gap: .5rem;
  flex-shrink: 0; z-index: 10; flex-wrap: wrap;
  box-shadow: 0 3px 20px rgba(0,0,0,.5);
  position: relative;
}
header::after {
  content: '';
  position: absolute; bottom: -4px; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--plight), transparent);
  opacity: .5;
}

.header-logo {
  display: flex; align-items: center; gap: .6rem;
}
.header-logo img {
  width: 46px; height: 46px; border-radius: 50%;
  border: 2px solid var(--primary);
  box-shadow: 0 0 12px rgba(201,162,39,.4);
  flex-shrink: 0;
}
.header-school {
  display: flex; flex-direction: column; line-height: 1.15;
}
.header-school .school-name {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(.75rem, 2.5vw, 1.05rem);
  color: var(--primary);
  letter-spacing: .3px;
}
.header-school .game-name {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(1rem, 3.5vw, 1.45rem);
  color: var(--text);
  letter-spacing: .5px;
}
.header-school .sub {
  font-size: clamp(.52rem, 1.6vw, .66rem);
  color: var(--muted); font-weight: 600;
}

.header-right { display: flex; align-items: center; gap: .45rem; flex-wrap: wrap; }

/* speed */
.speed-selector { display: flex; gap: .2rem; }
.spd-btn {
  font-family: 'Nunito', sans-serif; font-weight: 800; font-size: .65rem;
  padding: .22rem .55rem; border-radius: 99px;
  border: 1.5px solid var(--border);
  background: var(--surface); color: var(--muted); cursor: pointer;
  transition: all .15s;
}
.spd-btn.active { background: var(--primary); border-color: var(--primary); color: #0a1628; }
.spd-btn:hover:not(.active) { border-color: var(--plight); color: var(--plight); }

/* scoreboard */
.scoreboard { display: flex; gap: .3rem; }
.score-box {
  display: flex; flex-direction: column; align-items: center;
  border-radius: 10px; padding: .22rem .55rem; min-width: 44px;
  border: 1.5px solid transparent;
}
.score-box.cb { border-color: rgba(31,209,114,.3); background: rgba(31,209,114,.08); }
.score-box.wb { border-color: rgba(232,69,69,.3);  background: rgba(232,69,69,.08); }
.score-box.pb { border-color: var(--border); background: rgba(201,162,39,.08); min-width: 56px; }
.slabel { font-size: .52rem; font-weight: 800; text-transform: uppercase; letter-spacing: .7px; }
.score-box.cb .slabel { color: var(--correct); }
.score-box.wb .slabel { color: var(--wrong); }
.score-box.pb .slabel { color: var(--primary); }
.sval { font-family: 'Fredoka One', cursive; font-size: 1.25rem; line-height: 1; }
.score-box.cb .sval { color: var(--correct); }
.score-box.wb .sval { color: var(--wrong); }
.score-box.pb .sval { color: var(--primary); }
@keyframes ptBump { 0%{transform:scale(1)} 40%{transform:scale(1.4)} 100%{transform:scale(1)} }
.bump { animation: ptBump .3s ease; }
.pt-float {
  position: fixed; font-family: 'Fredoka One', cursive; font-size: 1.05rem;
  pointer-events: none; z-index: 200; animation: ptFloat .85s ease forwards;
  text-shadow: 0 2px 8px rgba(0,0,0,.6);
}
@keyframes ptFloat {
  0%  { opacity:1; transform: translateY(0) scale(1); }
  100%{ opacity:0; transform: translateY(-55px) scale(1.2); }
}

/* ── GAME AREA ── */
#game-area {
  flex: 1; position: relative; overflow: hidden; z-index: 1;
  background: linear-gradient(180deg, #0d1e3d 0%, #0a1628 100%);
}
#game-area::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 4px;
  background: repeating-linear-gradient(90deg, var(--accent) 0, var(--accent) 10px, transparent 10px, transparent 18px);
  opacity: .5;
}

/* ── COMBO BAR ── */
#combo-bar {
  position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: .4rem;
  background: rgba(10,22,40,.88); border-radius: 99px;
  padding: .28rem .9rem .28rem .6rem;
  border: 1.5px solid var(--border);
  box-shadow: 0 2px 14px rgba(0,0,0,.4);
  backdrop-filter: blur(8px);
  z-index: 20; transition: opacity .3s; opacity: 0; pointer-events: none;
}
#combo-bar.visible { opacity: 1; }
#combo-flame { font-size: 1.2rem; line-height: 1; }
#combo-text {
  font-family: 'Fredoka One', cursive; font-size: .95rem;
  color: var(--text); line-height: 1; white-space: nowrap;
}
#combo-text span { color: var(--primary); }
#combo-bar.lv1 { border-color: rgba(201,162,39,.3); }
#combo-bar.lv2 { border-color: #f59e0b; box-shadow: 0 2px 14px rgba(245,158,11,.3); }
#combo-bar.lv3 { border-color: #f97316; box-shadow: 0 2px 16px rgba(249,115,22,.4); }
#combo-bar.lv4 { border-color: var(--accent); box-shadow: 0 2px 18px rgba(214,40,40,.5); }

/* ── FALLING CARD ── */
.falling-card {
  position: absolute;
  background: linear-gradient(135deg, #132240 0%, #1a2d52 100%);
  border-radius: 20px;
  box-shadow: 0 8px 32px rgba(0,0,0,.6), 0 0 0 1px rgba(201,162,39,.15);
  padding: .8rem 1.2rem;
  text-align: center;
  min-width: 170px; max-width: 82vw;
  border: 2px solid rgba(201,162,39,.35);
  z-index: 5;
}
.falling-card .emoji-line {
  font-size: clamp(1.5rem, 5vw, 2.2rem); line-height: 1.3; letter-spacing: 2px;
}
.falling-card .card-num {
  font-size: .6rem; color: var(--primary); font-weight: 800;
  letter-spacing: 1px; margin-bottom: .18rem; text-transform: uppercase;
}
@keyframes correctPop {
  0%  { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.18); opacity: .8; }
  100%{ transform: scale(0);   opacity: 0; }
}
@keyframes wrongShake {
  0%,100%{ transform: translateX(0); }
  20%    { transform: translateX(-10px); }
  40%    { transform: translateX(10px); }
  60%    { transform: translateX(-6px); }
  80%    { transform: translateX(6px); }
}

/* ── TOAST ── */
#toast {
  position: absolute; top: 44%; left: 50%;
  transform: translate(-50%,-50%) scale(0);
  background: var(--wrong); color: #fff;
  font-family: 'Fredoka One', cursive; font-size: 1.2rem;
  padding: .5rem 1.4rem; border-radius: 99px;
  z-index: 20; pointer-events: none;
  transition: transform .13s; white-space: nowrap;
  box-shadow: 0 4px 20px rgba(214,40,40,.5);
}
#toast.show { transform: translate(-50%,-50%) scale(1); }
#toast.ok   { background: var(--correct); box-shadow: 0 4px 20px rgba(31,209,114,.5); }

/* ── INFO PANEL ── */
#info-panel {
  position: absolute; inset: 0;
  background: rgba(5,12,26,.88);
  display: flex; align-items: center; justify-content: center;
  z-index: 30; opacity: 0; pointer-events: none;
  transition: opacity .25s; backdrop-filter: blur(4px);
}
#info-panel.show { opacity: 1; pointer-events: all; }
.info-card {
  background: linear-gradient(135deg, #132240 0%, #1a2d52 100%);
  border-radius: 24px;
  padding: 1.4rem 1.6rem;
  max-width: 360px; width: 90vw;
  box-shadow: 0 16px 60px rgba(0,0,0,.6);
  border: 1.5px solid rgba(201,162,39,.3);
  animation: popIn .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn { from{transform:scale(.7);opacity:0} to{transform:scale(1);opacity:1} }
.info-word {
  font-family: 'Fredoka One', cursive; font-size: 1.75rem; color: var(--primary);
  display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; margin-bottom: .3rem;
}
.info-tr   { color: var(--muted); font-weight: 700; font-size: .9rem; margin-bottom: .65rem; }
.info-ex   {
  background: rgba(255,255,255,.05); border-radius: 12px;
  padding: .6rem .8rem; font-size: .86rem; line-height: 1.55;
  border: 1px solid rgba(255,255,255,.07);
}
.info-ex .en { color: var(--text); font-weight: 600; }
.info-ex .en em { color: var(--plight); font-style: normal; font-weight: 800; }
.info-ex .tr-ex { color: var(--muted); font-size: .8rem; margin-top: .3rem; }
.countdown-wrap {
  display: flex; align-items: center; justify-content: center; margin-top: .85rem; gap: .6rem;
}
.countdown-ring { position: relative; width: 44px; height: 44px; flex-shrink: 0; }
.countdown-ring svg { transform: rotate(-90deg); }
.countdown-ring circle.bg { fill: none; stroke: rgba(255,255,255,.1); stroke-width: 4; }
.countdown-ring circle.fg {
  fill: none; stroke: var(--primary); stroke-width: 4;
  stroke-dasharray: 113; stroke-dashoffset: 0;
  transition: stroke-dashoffset .9s linear, stroke .3s; stroke-linecap: round;
}
.countdown-num {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  font-family: 'Fredoka One', cursive; font-size: 1.1rem; color: var(--primary);
}
.countdown-label { font-size: .75rem; color: var(--muted); font-weight: 700; }

/* speak button */
.speak-btn {
  background: none; border: 1.5px solid var(--correct); color: var(--correct);
  border-radius: 99px; font-family: 'Nunito', sans-serif; font-weight: 800;
  font-size: .78rem; padding: .25rem .75rem; cursor: pointer;
  display: inline-flex; align-items: center; gap: .3rem;
  transition: background .15s, transform .1s;
}
.speak-btn:hover { background: rgba(31,209,114,.12); transform: scale(1.04); }
.speak-btn.speaking { animation: speakPulse .5s infinite alternate; }
@keyframes speakPulse { from{opacity:1} to{opacity:.35} }
.combo-badge {
  display: inline-flex; align-items: center; gap: .3rem;
  background: linear-gradient(135deg, #c9a227, #d62828);
  color: #fff; font-family: 'Fredoka One', cursive;
  font-size: .78rem; border-radius: 99px; padding: .18rem .65rem;
  animation: badgePop .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes badgePop { from{transform:scale(0)} to{transform:scale(1)} }

/* ── ANSWER POOL ── */
#answer-pool {
  background: linear-gradient(180deg, #0f1e38 0%, #0a1628 100%);
  border-top: 2px solid var(--border);
  padding: .55rem .7rem .65rem;
  flex-shrink: 0;
  box-shadow: 0 -4px 20px rgba(0,0,0,.4);
  min-height: 68px; max-height: 36vh; overflow-y: auto;
  position: relative;
}
#answer-pool-inner { display: flex; flex-wrap: wrap; gap: .38rem; }
.ans-btn {
  font-family: 'Nunito', sans-serif; font-weight: 700;
  font-size: clamp(.68rem, 2.4vw, .86rem);
  padding: .36rem .82rem; border-radius: 99px;
  border: 1.5px solid rgba(201,162,39,.3);
  background: rgba(201,162,39,.07);
  color: var(--text); cursor: pointer;
  transition: transform .12s, background .12s, border-color .12s, box-shadow .12s;
  white-space: nowrap;
}
.ans-btn:hover:not(:disabled) {
  background: rgba(201,162,39,.18); border-color: var(--primary);
  transform: translateY(-2px); box-shadow: 0 4px 14px rgba(201,162,39,.2);
}
.ans-btn:active:not(:disabled) { transform: scale(.95); }
.ans-btn:disabled { opacity: 0; pointer-events: none; }
.ans-btn.flash-wrong {
  background: rgba(214,40,40,.2); border-color: var(--wrong); color: var(--wrong);
  animation: btnShake .35s ease;
}
@keyframes btnShake {
  0%,100%{ transform: translateX(0); }
  25%    { transform: translateX(-5px); }
  75%    { transform: translateX(5px); }
}
.ans-btn.flash-correct { background: rgba(31,209,114,.15); border-color: var(--correct); color: var(--correct); }
#answer-pool::-webkit-scrollbar { width: 4px; }
#answer-pool::-webkit-scrollbar-thumb { background: rgba(201,162,39,.3); border-radius: 99px; }

/* ── PARTICLES ── */
.particle {
  position: absolute; pointer-events: none; font-size: 1.2rem;
  animation: pfly .75s ease forwards; z-index: 15;
}
@keyframes pfly {
  from{ transform: translate(0,0) scale(1); opacity: 1; }
  to  { transform: translate(var(--dx),var(--dy)) scale(0); opacity: 0; }
}

/* ── OVERLAY ── */
#overlay {
  position: fixed; inset: 0; background: rgba(5,10,20,.9);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; backdrop-filter: blur(8px);
}
.overlay-card {
  background: linear-gradient(145deg, #132240 0%, #1a2d52 100%);
  border-radius: 28px; padding: 2rem 1.8rem; text-align: center;
  max-width: 380px; width: 92vw;
  box-shadow: 0 24px 80px rgba(0,0,0,.7);
  border: 1.5px solid rgba(201,162,39,.3);
  animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
  max-height: 92vh; overflow-y: auto;
}
.overlay-card::-webkit-scrollbar { width: 4px; }
.overlay-card::-webkit-scrollbar-thumb { background: rgba(201,162,39,.3); border-radius: 99px; }

/* overlay logo */
.overlay-logo {
  display: flex; align-items: center; justify-content: center; gap: .7rem;
  margin-bottom: .9rem;
}
.overlay-logo img {
  width: 56px; height: 56px; border-radius: 50%;
  border: 2px solid var(--primary);
  box-shadow: 0 0 18px rgba(201,162,39,.45);
}
.overlay-school {
  text-align: left; line-height: 1.2;
}
.overlay-school .s1 {
  font-family: 'Fredoka One', cursive; font-size: .9rem; color: var(--primary);
}
.overlay-school .s2 {
  font-family: 'Fredoka One', cursive; font-size: 1.1rem; color: var(--text);
}

.overlay-card h2 {
  font-family: 'Fredoka One', cursive; font-size: 1.85rem; color: var(--primary); margin-bottom: .3rem;
}
.overlay-card > p {
  color: var(--muted); font-size: .9rem; margin-bottom: 1.1rem; line-height: 1.5;
}
.final-scores { display: flex; gap: .7rem; justify-content: center; margin-bottom: 1rem; }
.fsb { flex: 1; border-radius: 14px; padding: .65rem; font-family: 'Fredoka One', cursive; }
.fsb.c { background: rgba(31,209,114,.1); color: var(--correct); border: 1px solid rgba(31,209,114,.25); }
.fsb.w { background: rgba(232,69,69,.1);  color: var(--wrong);   border: 1px solid rgba(232,69,69,.25); }
.fsb.p { background: rgba(201,162,39,.1); color: var(--primary); border: 1px solid var(--border); }
.fsb .fsv { font-size: 1.9rem; line-height: 1; }
.fsb .fsl { font-size: .64rem; font-family: 'Nunito', sans-serif; font-weight: 800; letter-spacing: .8px; text-transform: uppercase; }

/* wrong list */
.wrong-list-wrap { text-align: left; margin-bottom: 1rem; max-height: 32vh; overflow-y: auto; }
.wrong-list-wrap h3 { font-size: .76rem; font-weight: 800; color: var(--wrong); text-transform: uppercase; letter-spacing: .7px; margin-bottom: .45rem; text-align: center; }
.wrong-item {
  display: flex; align-items: flex-start; gap: .45rem;
  background: rgba(214,40,40,.07); border: 1px solid rgba(214,40,40,.2); border-radius: 10px;
  padding: .42rem .65rem; margin-bottom: .3rem; font-size: .78rem;
}
.wrong-item .wi-answer { font-weight: 800; color: var(--wrong); }
.wrong-item .wi-tr { color: var(--muted); font-size: .72rem; }
.wrong-list-wrap::-webkit-scrollbar { width: 4px; }
.wrong-list-wrap::-webkit-scrollbar-thumb { background: rgba(214,40,40,.3); border-radius: 99px; }

.big-btn {
  background: linear-gradient(135deg, var(--primary), #a07810);
  color: #0a1628; font-family: 'Fredoka One', cursive; font-size: 1.1rem;
  border: none; border-radius: 99px; padding: .75rem 2rem;
  cursor: pointer; box-shadow: 0 6px 20px rgba(201,162,39,.4);
  transition: transform .15s, box-shadow .15s; letter-spacing: .5px;
  width: 100%; margin-top: .3rem;
}
.big-btn:hover { transform: scale(1.04); box-shadow: 0 8px 28px rgba(201,162,39,.55); }

/* speed picker */
.speed-pick { margin-bottom: 1rem; }
.speed-pick p { font-size: .78rem; font-weight: 700; color: var(--muted); margin-bottom: .45rem; }
.speed-pick-btns { display: flex; gap: .4rem; justify-content: center; }
.spk-btn {
  font-family: 'Nunito', sans-serif; font-weight: 800; font-size: .82rem;
  padding: .38rem 1rem; border-radius: 99px;
  border: 1.5px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer;
  transition: all .15s;
}
.spk-btn.active { background: var(--primary); border-color: var(--primary); color: #0a1628; }
.spk-btn:hover:not(.active) { border-color: var(--plight); color: var(--plight); }

/* divider */
.gold-divider {
  height: 1px; background: linear-gradient(90deg, transparent, var(--primary), transparent);
  margin: .8rem 0; opacity: .4;
}
</style>
</head>
<body>

<!-- decorative atom orbits -->
<div class="atom-bg">
  <div class="orbit"></div>
  <div class="orbit"></div>
  <div class="orbit"></div>
</div>

<!-- HEADER -->

// ═══════════════════════════════════════════════════════════
// SPEED CONFIG  (ms to fall full screen)
// ═══════════════════════════════════════════════════════════
const SPEEDS = { slow: 14000, mid: 9000, fast: 5000 };
let chosenSpeed = 'mid';

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let scoreCorrect = 0, scoreWrong = 0, scorePoints = 0;
let wrongList    = []; // puzzles answered wrong or missed
let combo        = 0;  // current streak of correct answers
let maxCombo     = 0;  // highest combo reached

// ── POOL SYSTEM ──────────────────────────────────────────
const POOL_SIZE   = 20;   // visible answer chips at a time
const WIN_SCORE   = 100;  // reach this → win
const LOSE_SCORE  = -50;  // drop to this → lose
let remaining    = [];    // puzzles not yet played (full list minus solved)
let currentPool  = [];    // the 20 answers shown right now
let solvedAnswers= new Set(); // answers already correctly answered
let currentPuzzle= null;
let fallingEl    = null;
let fallTimer    = null;
let fallStart    = null;
let fallDuration = SPEEDS.mid;
let pausedAt     = null;   // elapsed ms when paused
let gameAreaH    = 0;
let isPaused     = false;
let infoCountdownTimer = null;
let currentSpeakBtn = null;

// ═══════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

// ═══════════════════════════════════════════════════════════
// COMBO & POINTS
// ═══════════════════════════════════════════════════════════

/**
 * Calculate points for a correct answer:
 *   Base: 10
 *   + Combo bonus: (combo - 1) * 2  (starts at 0 for combo=1, +2 each subsequent)
 *   + Position bonus: card in top 33% of game area → +5
 *   + Speed bonus: fast mode → +2
 */
function calcPoints(cardTopPx) {
  let pts = 10;
  // combo bonus: every streak adds 2 more (combo=1→+0, combo=2→+2, combo=3→+4 …)
  if (combo > 1) pts += (combo - 1) * 2;
  // position bonus — card caught in top third of game area
  if (cardTopPx !== null && cardTopPx < gameAreaH / 3) pts += 5;
  // speed bonus
  if (chosenSpeed === 'fast') pts += 2;
  return pts;
}

function addPoints(delta, x, y, label) {
  scorePoints += delta;
  // clamp display (can go below -50 display-wise but we catch it)
  const el = document.getElementById('sp');
  el.textContent = scorePoints;
  el.classList.remove('bump');
  void el.offsetWidth;
  el.classList.add('bump');
  // colour the score box based on value
  const pb = el.closest('.score-box');
  if (pb) {
    pb.style.borderColor = scorePoints >= WIN_SCORE ? 'var(--correct)'
                         : scorePoints <= LOSE_SCORE ? 'var(--wrong)'
                         : scorePoints > 0 ? 'rgba(201,162,39,.5)'
                         : 'rgba(232,69,69,.4)';
  }
  // LOSE check (only for negative delta)
  if (delta < 0 && scorePoints <= LOSE_SCORE) {
    setTimeout(() => endGame('lose'), 400);
  }
  // floating label
  const fl = document.createElement('div');
  fl.className = 'pt-float';
  fl.textContent = label || (delta > 0 ? '+' + delta : String(delta));
  fl.style.color  = delta > 0 ? 'var(--correct)' : 'var(--wrong)';
  fl.style.left   = (x || window.innerWidth / 2) + 'px';
  fl.style.top    = (y || 80) + 'px';
  document.body.appendChild(fl);
  setTimeout(() => fl.remove(), 950);
}

function updateComboBar() {
  const bar  = document.getElementById('combo-bar');
  const num  = document.getElementById('combo-num');
  const pts  = document.getElementById('combo-pts');
  const flame= document.getElementById('combo-flame');

  if (combo <= 1) {
    bar.className = '';   // hide when no streak
    return;
  }
  bar.classList.add('visible');
  num.textContent = combo;
  // preview next reward
  const preview = 10 + (combo - 1) * 2 + (chosenSpeed === 'fast' ? 2 : 0);
  pts.textContent = preview;

  // level theming
  bar.className = 'visible ' +
    (combo >= 6 ? 'lv4' : combo >= 4 ? 'lv3' : combo >= 2 ? 'lv2' : 'lv1');
  flame.textContent = combo >= 6 ? '🔥🔥' : combo >= 4 ? '🔥' : '⚡';
}

function breakCombo() {
  combo = 0;
  const bar = document.getElementById('combo-bar');
  bar.className = '';
}


function getBestEnglishVoice() {
  const voices = window.speechSynthesis.getVoices();
  const isEn = v => v.lang.toLowerCase().startsWith('en')
                 && !v.name.toLowerCase().includes('turkish')
                 && !v.name.toLowerCase().includes('türkçe');
  return voices.find(v => v.lang==='en-US' && isEn(v))
      || voices.find(v => v.lang==='en-GB' && isEn(v))
      || voices.find(v => isEn(v))
      || null;
}

function speak(text, btnEl) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  if (currentSpeakBtn) { currentSpeakBtn.classList.remove('speaking'); currentSpeakBtn=null; }

  const doIt = () => {
    const utt = new SpeechSynthesisUtterance(text);
    utt.rate = 0.82; utt.pitch = 1;
    const v = getBestEnglishVoice();
    if (v) { utt.voice = v; utt.lang = v.lang; } else { utt.lang = 'en-US'; }
    if (btnEl) {
      currentSpeakBtn = btnEl;
      btnEl.classList.add('speaking');
      utt.onend = utt.onerror = () => { btnEl.classList.remove('speaking'); currentSpeakBtn=null; };
    }
    window.speechSynthesis.speak(utt);
  };

  const voices = window.speechSynthesis.getVoices();
  if (voices.length > 0) { doIt(); }
  else { window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.onvoiceschanged=null; doIt(); }; }
}

// ═══════════════════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════════════════
function startGame() {
  scoreCorrect  = scoreWrong = scorePoints = 0;
  wrongList     = [];
  combo         = 0;
  maxCombo      = 0;
  solvedAnswers = new Set();
  fallDuration  = SPEEDS[chosenSpeed];
  remaining     = shuffle([...ALL_PUZZLES]);
  document.getElementById('sc').textContent = '0';
  document.getElementById('sw').textContent = '0';
  document.getElementById('sp').textContent = '0';
  document.getElementById('overlay').style.display = 'none';
  hideInfoPanel();
  drawPool();        // pick first 20
  buildAnswerPool(); // render them
  nextPuzzle();
}

// ═══════════════════════════════════════════════════════════
// ANSWER POOL — random positions (shuffled flex order)
// ═══════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════
// POOL SYSTEM
// ═══════════════════════════════════════════════════════════

/** Pick a fresh random 20-answer pool from ALL_PUZZLES,
 *  excluding answers already permanently solved. */
function drawPool() {
  const available = ALL_PUZZLES.filter(p => !solvedAnswers.has(p.answer));
  // if fewer than 20 remain, use all
  const size = Math.min(POOL_SIZE, available.length);
  currentPool = shuffle(available).slice(0, size);
}

/** Render currentPool as answer chips. */
function buildAnswerPool() {
  const pool = document.getElementById('answer-pool-inner');
  pool.innerHTML = '';
  const answers = shuffle(currentPool.map(p => p.answer));
  answers.forEach(ans => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.textContent = ans;
    btn.dataset.answer = ans;
    btn.style.order = Math.floor(Math.random() * 60);
    btn.addEventListener('click', () => onAnswerClick(ans, btn));
    pool.appendChild(btn);
  });
}

/** After a correct answer: mark solved, draw fresh pool, rebuild chips. */
function reshufflePool() {
  // current puzzle answer is now permanently solved
  if (currentPuzzle) solvedAnswers.add(currentPuzzle.answer);
  drawPool();
  buildAnswerPool();
}

// ═══════════════════════════════════════════════════════════
// NEXT PUZZLE
// ═══════════════════════════════════════════════════════════
function nextPuzzle() {
  // Filter remaining to only puzzles whose answer is in the current pool
  const eligible = remaining.filter(p => currentPool.some(cp => cp.answer === p.answer));
  if (eligible.length === 0) {
    // No eligible puzzles left at all → game over
    endGame(); return;
  }
  const idx = Math.floor(Math.random() * eligible.length);
  currentPuzzle = eligible[idx];
  spawnFalling(currentPuzzle);
}

// ═══════════════════════════════════════════════════════════
// SPAWN FALLING CARD
// ═══════════════════════════════════════════════════════════
function spawnFalling(puzzle) {
  if (fallingEl)  { fallingEl.remove(); fallingEl = null; }
  if (fallTimer)  { cancelAnimationFrame(fallTimer); fallTimer = null; }

  isPaused  = false;
  pausedAt  = null;
  gameAreaH = document.getElementById('game-area').clientHeight;

  const card = document.createElement('div');
  card.className = 'falling-card';
  card.innerHTML = `
    <div class="card-num">🧩 Resfebe #${ALL_PUZZLES.indexOf(puzzle)+1}</div>
    <div class="emoji-line">${puzzle.emojis}</div>
  `;

  // random horizontal start (keep card mostly visible)
  const cardW = Math.min(window.innerWidth * 0.82, 300);
  const margin = 20;
  const maxLeft = window.innerWidth - cardW - margin;
  const randLeft = margin + Math.random() * Math.max(0, maxLeft - margin);
  card.style.left = randLeft + 'px';
  card.style.transform = 'none';

  document.getElementById('game-area').appendChild(card);
  fallingEl = card;

  fallStart = performance.now();
  const cardH = 100;

  function step(now) {
    if (isPaused) { fallTimer = requestAnimationFrame(step); return; }
    const elapsed = now - fallStart;
    const progress = elapsed / fallDuration;
    const topPx = -cardH + (gameAreaH + cardH) * progress;
    card.style.top = topPx + 'px';
    if (progress >= 1) { onMissed(); return; }
    fallTimer = requestAnimationFrame(step);
  }
  fallTimer = requestAnimationFrame(step);
}

// ═══════════════════════════════════════════════════════════
// ANSWER CLICK
// ═══════════════════════════════════════════════════════════
function onAnswerClick(answer, btn) {
  if (isPaused || !currentPuzzle) return;

  if (answer === currentPuzzle.answer) {
    // ✅ CORRECT
    isPaused = true;
    cancelAnimationFrame(fallTimer);
    scoreCorrect++;
    document.getElementById('sc').textContent = scoreCorrect;

    // get card position for top-bonus check
    const cardTopPx = fallingEl ? parseFloat(fallingEl.style.top) : null;

    // increment combo
    combo++;
    if (combo > maxCombo) maxCombo = combo;

    // calculate points
    const earned = calcPoints(cardTopPx);
    const btnRect = btn.getBoundingClientRect();

    // build a descriptive float label
    let floatLabel = '+' + earned;
    if (combo > 1)                            floatLabel += ' 🔥x' + combo;
    if (cardTopPx !== null && cardTopPx < gameAreaH / 3) floatLabel += ' 🎯';
    if (chosenSpeed === 'fast')               floatLabel += ' ⚡';

    addPoints(earned, btnRect.left + btnRect.width / 2, btnRect.top, floatLabel);
    updateComboBar();

    btn.classList.add('flash-correct');
    setTimeout(() => { btn.disabled = true; }, 300);

    // card pop
    if (fallingEl) {
      fallingEl.style.animation = 'none';
      fallingEl.style.transition = 'none';
      fallingEl.style.transformOrigin = 'center center';
      fallingEl.style.animation = 'correctPop .4s ease forwards';
    }

    spawnParticles(fallingEl);

    // remove from remaining
    remaining = remaining.filter(p => p !== currentPuzzle);

    // ── CHECK WIN ──
    if (scorePoints >= WIN_SCORE) {
      const puzzle = currentPuzzle;
      setTimeout(() => {
        if (fallingEl) { fallingEl.remove(); fallingEl = null; }
        showInfoPanel(puzzle, earned, combo, () => endGame('win'));
      }, 350);
      return;
    }

    // show info panel after 300ms
    const puzzle = currentPuzzle;
    setTimeout(() => {
      if (fallingEl) { fallingEl.remove(); fallingEl = null; }
      showInfoPanel(puzzle, earned, combo);
      reshufflePool();
    }, 350);

  } else {
    // ❌ WRONG — break combo
    scoreWrong++;
    document.getElementById('sw').textContent = scoreWrong;
    breakCombo();

    const btnRect = btn.getBoundingClientRect();
    addPoints(-10, btnRect.left + btnRect.width / 2, btnRect.top, '−10');

    if (!wrongList.find(p => p === currentPuzzle)) wrongList.push(currentPuzzle);

    btn.classList.add('flash-wrong');
    setTimeout(() => btn.classList.remove('flash-wrong'), 400);
    if (fallingEl) {
      fallingEl.classList.add('wrong-flash');
      setTimeout(() => { if (fallingEl) fallingEl.classList.remove('wrong-flash'); }, 420);
    }
    showToast('❌ Tekrar Dene!', false);
  }
}

// ═══════════════════════════════════════════════════════════
// INFO PANEL — 6s countdown
// ═══════════════════════════════════════════════════════════
function showInfoPanel(puzzle, earned, currentCombo, onDone) {
  isPaused = true;
  const panel = document.getElementById('info-panel');
  const total = 5;
  const circ  = 2 * Math.PI * 18;

  const comboBadge = (currentCombo >= 2)
    ? `<span class="combo-badge">🔥 ${currentCombo}x Kombo!</span>` : '';

  panel.innerHTML = `
    <div class="info-card" id="info-card">
      <div class="info-word">
        ${puzzle.answer}
        <button class="speak-btn" id="speak-now">🔊 Dinle</button>
        ${comboBadge}
      </div>
      <div class="info-tr">🇹🇷 ${puzzle.tr} &nbsp;·&nbsp; <em style="color:var(--plight);font-style:normal">${puzzle.pron}</em></div>
      <div class="info-ex">
        <div class="en">💬 ${puzzle.ex}</div>
        <div class="tr-ex">🇹🇷 ${puzzle.exTr}</div>
      </div>
      <div class="countdown-wrap">
        <div class="countdown-ring">
          <svg width="44" height="44" viewBox="0 0 44 44">
            <circle class="bg" cx="22" cy="22" r="18"/>
            <circle class="fg" id="cring" cx="22" cy="22" r="18"
              style="stroke-dasharray:${circ};stroke-dashoffset:0"/>
          </svg>
          <div class="countdown-num" id="cnum">${total}</div>
        </div>
        <span class="countdown-label">saniye içinde devam edecek</span>
      </div>
    </div>
  `;

  panel.classList.add('show');

  // auto-speak
  setTimeout(() => {
    const spkBtn = document.getElementById('speak-now');
    if (spkBtn) speak(puzzle.answer, spkBtn);
  }, 200);

  document.getElementById('speak-now').addEventListener('click', () => {
    speak(puzzle.answer, document.getElementById('speak-now'));
  });

  // countdown
  let remaining_s = total;
  const cring = document.getElementById('cring');
  const cnum  = document.getElementById('cnum');

  if (infoCountdownTimer) clearInterval(infoCountdownTimer);
  infoCountdownTimer = setInterval(() => {
    remaining_s--;
    if (cnum) cnum.textContent = remaining_s;
    const offset = circ * (1 - remaining_s / total);
    if (cring) {
      cring.style.strokeDashoffset = offset;
      if (remaining_s <= 2) cring.style.stroke = 'var(--wrong)';
    }
    if (remaining_s <= 0) {
      clearInterval(infoCountdownTimer);
      hideInfoPanel();
      if (onDone) { onDone(); } else { reshufflePool(); nextPuzzle(); }
    }
  }, 1000);
}

function hideInfoPanel() {
  if (infoCountdownTimer) { clearInterval(infoCountdownTimer); infoCountdownTimer = null; }
  window.speechSynthesis && window.speechSynthesis.cancel();
  document.getElementById('info-panel').classList.remove('show');
  isPaused = false;
}

// ═══════════════════════════════════════════════════════════
// MISSED
// ═══════════════════════════════════════════════════════════
function onMissed() {
  scoreWrong++;
  document.getElementById('sw').textContent = scoreWrong;
  breakCombo();
  addPoints(-10, window.innerWidth / 2, 120, '−10');
  if (!wrongList.find(p => p === currentPuzzle)) wrongList.push(currentPuzzle);
  if (fallingEl) { fallingEl.remove(); fallingEl = null; }
  showToast('⏰ Kaçırdın! −10', false);
  if (scorePoints > LOSE_SCORE) {
    setTimeout(() => { reshufflePool(); nextPuzzle(); }, 700);
  }
}

// ═══════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════
let toastTimer = null;
function showToast(msg, ok) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (ok ? ' ok' : '');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, 900);
}

// ═══════════════════════════════════════════════════════════
// PARTICLES
// ═══════════════════════════════════════════════════════════
function spawnParticles(anchor) {
  if (!anchor) return;
  const rect     = anchor.getBoundingClientRect();
  const gameRect = document.getElementById('game-area').getBoundingClientRect();
  const cx = rect.left + rect.width/2  - gameRect.left;
  const cy = rect.top  + rect.height/2 - gameRect.top;
  const fx = ['⭐','✨','🎉','💫','🌟','🎊'];
  for (let i=0;i<8;i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = fx[i % fx.length];
    const angle = (i/8)*Math.PI*2;
    const dist  = 55 + Math.random()*40;
    p.style.setProperty('--dx', Math.cos(angle)*dist+'px');
    p.style.setProperty('--dy', Math.sin(angle)*dist+'px');
    p.style.left = cx+'px'; p.style.top = cy+'px';
    document.getElementById('game-area').appendChild(p);
    setTimeout(() => p.remove(), 800);
  }
}

// ═══════════════════════════════════════════════════════════
// END GAME
// ═══════════════════════════════════════════════════════════
function endGame(reason) {
  if (fallingEl) { fallingEl.remove(); fallingEl = null; }
  if (fallTimer) { cancelAnimationFrame(fallTimer); fallTimer = null; }
  hideInfoPanel();

  const total = ALL_PUZZLES.length;
  const pct   = Math.round(scoreCorrect/(scoreCorrect+scoreWrong)*100)||0;

  let emoji, headline, subline;
  if (reason === 'win') {
    emoji = '🏆'; headline = 'Kazandın!';
    subline = `<em>${WIN_SCORE} puana ulaştın!</em> Harika iş! 🎉`;
  } else if (reason === 'lose') {
    emoji = '💀'; headline = 'Oyun Bitti!';
    subline = `Puan <em>${LOSE_SCORE}'ın altına düştü.</em> Tekrar dene! 💪`;
  } else {
    emoji = pct>=90?'🏆':pct>=70?'🎉':pct>=50?'👏':'💪';
    headline = 'Oyun Bitti!';
    subline = `Tüm ${total} resfebe tamamlandı! Doğruluk: <strong>${pct}%</strong>`;
  }

  const ptColor = scorePoints >= WIN_SCORE ? 'var(--correct)'
                : scorePoints <= LOSE_SCORE ? 'var(--wrong)'
                : scorePoints >= 0 ? 'var(--correct)' : 'var(--wrong)';
  const comboLine = maxCombo >= 2
    ? `<p style="font-size:.85rem;color:var(--accent);font-weight:800;margin-bottom:.8rem">🔥 En yüksek kombo: ${maxCombo}x</p>`
    : '';

  // build wrong list HTML
  let wrongHTML = '';
  if (wrongList.length === 0) {
    wrongHTML = `<div style="text-align:center;color:var(--correct);font-weight:800;font-size:.9rem;margin-bottom:1rem">🌟 Hiç hata yapmadın! Mükemmel!</div>`;
  } else {
    const items = wrongList.map(p => `
      <div class="wrong-item">
        <span class="wi-emoji">❌</span>
        <div>
          <div class="wi-answer">${p.answer}</div>
          <div class="wi-tr">${p.emojis} &nbsp;→&nbsp; 🇹🇷 ${p.tr}</div>
        </div>
      </div>`).join('');
    wrongHTML = `
      <div class="wrong-list-wrap">
        <h3>❌ Hata Yapılan / Kaçırılan (${wrongList.length})</h3>
        ${items}
      </div>`;
  }

  const oc = document.getElementById('overlay-card');
  oc.innerHTML = `
    <h2>${emoji} ${headline}</h2>
    <p>${subline}</p>
    <div class="final-scores">
      <div class="fsb c"><div class="fsv">${scoreCorrect}</div><div class="fsl">✅ Doğru</div></div>
      <div class="fsb w"><div class="fsv">${scoreWrong}</div><div class="fsl">❌ Yanlış</div></div>
      <div class="fsb p"><div class="fsv" style="color:${ptColor}">${scorePoints}</div><div class="fsl">⭐ Puan</div></div>
    </div>
    ${comboLine}
    ${wrongHTML}
    <div class="speed-pick">
      <p>⚡ Düşme Hızı</p>
      <div class="speed-pick-btns">
        <button class="spk-btn${chosenSpeed==='slow'?' active':''}" data-ospeed="slow">🐢 Yavaş</button>
        <button class="spk-btn${chosenSpeed==='mid'?' active':''}" data-ospeed="mid">🚶 Orta</button>
        <button class="spk-btn${chosenSpeed==='fast'?' active':''}" data-ospeed="fast">🚀 Hızlı</button>
      </div>
    </div>
    <button class="big-btn" onclick="startGame()">🔄 Tekrar Oyna</button>
  `;
  // re-bind overlay speed buttons
  oc.querySelectorAll('.spk-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      oc.querySelectorAll('.spk-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      chosenSpeed = btn.dataset.ospeed;
      fallDuration = SPEEDS[chosenSpeed];
      document.querySelectorAll('.spd-btn').forEach(b=>{
        b.classList.toggle('active', b.dataset.speed===chosenSpeed);
      });
    });
  });

  document.getElementById('overlay').style.display = 'flex';
}

// ═══════════════════════════════════════════════════════════
// RESIZE
// ═══════════════════════════════════════════════════════════
window.addEventListener('resize', () => {
  gameAreaH = document.getElementById('game-area').clientHeight;
});

// preload voices
if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}
</script>
</script>
